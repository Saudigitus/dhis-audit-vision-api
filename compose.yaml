services:
  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DATA_BASE_DIR: /app/data
      CONTROL_FILE_PATH: /app/data/control_file.json
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - audit_data:/app/data
      - audit_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${DB_NAME:?DB_NAME is required}"
      POSTGRES_USER: "${DB_USER:?DB_USER is required}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dhis2_audit_vision}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  audit_data:
  audit_logs:
  postgres_data:

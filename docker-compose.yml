version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-audit_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-audit_password}
      POSTGRES_DB: ${DB_NAME:-audit_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    command: ["uvicorn", "core.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres_data:
